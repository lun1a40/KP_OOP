<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToyFactoryAssets — Фонды</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
    <header class="topbar">
        <div class="topbar-inner">
            <a class="brand" href="/index.html">Toy<span>Factory</span>Assets</a>
            <nav class="menu">
                <a href="index.html">Дашборд</a>
                <a href="assets.html">Фонды</a>
                <a href="reports.html">Отчёты</a>
            </nav>
        </div>
    </header>

    <main>
        <h1>Основные фонды</h1>
        <p class="subtitle">Регистрация, перемещение, ремонт и списание фондов</p>

        <div id="error-box" class="notice error hidden"></div>

        <div class="toolbar">
            <div class="field">
                <label>Категория</label>
                <select id="f-category"><option value="">Все</option></select>
            </div>
            <div class="field">
                <label>Подразделение</label>
                <select id="f-department"><option value="">Все</option></select>
            </div>
            <div class="field">
                <label>Статус</label>
                <select id="f-status">
                    <option value="">Все</option>
                    <option value="InUse">В работе</option>
                    <option value="InRepair">В ремонте</option>
                    <option value="WrittenOff">Списан</option>
                </select>
            </div>
            <div class="field">
                <label>Поиск</label>
                <input id="f-query" type="text" placeholder="имя или инв. №">
            </div>
            <div class="spacer"></div>
            <button class="btn primary" id="btn-add">+ Добавить фонд</button>
        </div>

        <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th>Инв. №</th>
                        <th>Наименование</th>
                        <th>Категория</th>
                        <th>Подразделение</th>
                        <th>Статус</th>
                        <th class="num">Первонач. ст-ть</th>
                        <th>Действия</th>
                    </tr>
                </thead>
                <tbody id="assets-body"></tbody>
            </table>
        </div>
    </main>

    <!-- Модалка добавления / редактирования -->
    <div class="modal-overlay" id="asset-modal">
        <div class="modal">
            <div class="modal-head">
                <h2 id="asset-modal-title">Новый фонд</h2>
                <button class="close-x" data-close="asset-modal">&times;</button>
            </div>
            <form id="asset-form">
                <div class="modal-body">
                    <div class="field">
                        <label>Инвентарный номер</label>
                        <input name="inventoryNo" required>
                    </div>
                    <div class="field">
                        <label>Наименование</label>
                        <input name="name" required>
                    </div>
                    <div class="field">
                        <label>Категория</label>
                        <select name="category" id="form-category" required></select>
                    </div>
                    <div class="field">
                        <label>Подразделение</label>
                        <select name="departmentId" id="form-department" required></select>
                    </div>
                    <div class="field">
                        <label>Первоначальная стоимость, ₽</label>
                        <input name="initialCostRub" type="number" step="0.01" min="0" required>
                    </div>
                    <div class="field">
                        <label>Дата приобретения</label>
                        <input name="acquiredOn" type="date" required>
                    </div>
                    <div class="field">
                        <label>Срок полезного использования, мес.</label>
                        <input name="usefulLifeMonths" type="number" min="1" required>
                    </div>
                    <div id="cat-fields"></div>
                </div>
                <div class="modal-foot">
                    <button type="button" class="btn" data-close="asset-modal">Отмена</button>
                    <button type="submit" class="btn primary">Сохранить</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Универсальная модалка операций -->
    <div class="modal-overlay" id="op-modal">
        <div class="modal">
            <div class="modal-head">
                <h2 id="op-modal-title">Операция</h2>
                <button class="close-x" data-close="op-modal">&times;</button>
            </div>
            <form id="op-form">
                <div class="modal-body" id="op-fields"></div>
                <div class="modal-foot">
                    <button type="button" class="btn" data-close="op-modal">Отмена</button>
                    <button type="submit" class="btn primary">Выполнить</button>
                </div>
            </form>
        </div>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/assets.js"></script>
</body>
</html>
